name: Viral Intel Weekly Pipeline

on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set environment variables
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
          echo "EMAIL_FROM=$EMAIL_FROM" >> .env
          echo "EMAIL_TO=$EMAIL_TO" >> .env
          echo "GOOGLE_DRIVE_FOLDER_ID=$GOOGLE_DRIVE_FOLDER_ID" >> .env
          echo "DATABASE_URL=$DATABASE_URL" >> .env
      
      - name: Run pipeline
        run: python main.py
      
      - name: Notify success
        if: success()
        run: echo "Pipeline executed successfully!"
      
      - name: Notify failure
        if: failure()
        run: echo "Pipeline failed. Check logs."
