name: Viral Intel Weekly Pipeline

on:
  schedule:
    # Exécution chaque vendredi à 18h00 (UTC)
    - cron: '0 18 * * 5'
  # Permet aussi l'exécution manuelle depuis GitHub
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # Étape 1 : Récupérer le code du repository
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Étape 2 : Configurer Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Étape 4 : Configurer les variables d'environnement
      - name: Set environment variables
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
          echo "EMAIL_FROM=$EMAIL_FROM" >> .env
          echo "EMAIL_TO=$EMAIL_TO" >> .env
          echo "GOOGLE_DRIVE_FOLDER_ID=$GOOGLE_DRIVE_FOLDER_ID" >> .env
          echo "DATABASE_URL=$DATABASE_URL" >> .env
      
      # Étape 5 : Exécuter le pipeline
      - name: Run pipeline
        run: python main.py
      
      # Étape 6 : Envoyer une notification en cas de succès
      - name: Notify success
        if: success()
        run: echo "Pipeline exécuté avec succès !"
      
      # Étape 7 : Envoyer une notification en cas d'erreur
      - name: Notify failure
        if: failure()
        run: echo "Le pipeline a échoué. Vérifiez les logs."
